<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meridian — Dashboards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #111009;
      --bg-dark: #181510;
      --bg-card: #1e1a13;
      --bg-elev: #28231a;
      --border: #3a2f1e;
      --border-l: #52432b;
      --gold: #c9a84c;
      --gold-d: #7a621c;
      --gold-g: rgba(201,168,76,.13);
      --cream: #ede3d0;
      --t1: #ddd3bc;
      --t2: #8a7a60;
      --t3: #524535;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--t1);
      display: flex;
      flex-direction: column;
    }

    /* ── NAV BAR ── */
    .hub-bar {
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      background: var(--bg-dark);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    .hub-logo {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: .16em;
      text-decoration: none;
      flex-shrink: 0;
    }
    .hub-links {
      display: flex;
      gap: 4px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }
    .hub-link {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 16px;
      border-radius: 4px;
      border: 1px solid transparent;
      color: var(--t2);
      text-decoration: none;
      transition: all .15s;
    }
    .hub-link:hover { color: var(--cream); border-color: var(--border); }
    .hub-link.active { color: var(--gold); border-color: var(--border-l); background: var(--bg-elev); }

    /* ── TAB ROW ── */
    .tab-row {
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 4px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 9;
    }
    .dash-tab {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 16px;
      border-radius: 4px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--t3);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .dash-tab:hover { color: var(--t1); border-color: var(--border); }
    .dash-tab.active {
      color: var(--gold);
      border-color: var(--border-l);
      background: var(--bg-elev);
    }
    .tab-sep {
      width: 1px; height: 18px;
      background: var(--border);
      margin: 0 4px;
    }
    .tab-label {
      font-size: 11px;
      color: var(--t3);
      letter-spacing: .06em;
      margin-right: 4px;
      font-family: 'Inter', sans-serif;
    }

    /* ── IFRAME ── */
    .frame-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    #appFrame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="hub-bar">
    <a href="index.html" class="hub-logo">MERIDIAN</a>
    <div class="hub-links">
      <a href="index.html" class="hub-link">Home</a>
      <a href="dashboards.html" class="hub-link active">Dashboards</a>
      <a href="displays.html" class="hub-link">Displays</a>
    </div>
  </nav>

  <!-- TABS -->
  <div class="tab-row">
    <span class="tab-label">DASHBOARD</span>
    <div class="tab-sep"></div>
    <button class="dash-tab active" id="tab-timetable" onclick="loadDash('timetable.html','timetable')">
      Weekly Planner
    </button>
    <button class="dash-tab" id="tab-pomodoro" onclick="loadDash('pomodoro.html','pomodoro')">
      Focus Timer
    </button>
  </div>

  <!-- IFRAME -->
  <div class="frame-wrap">
    <iframe id="appFrame" src="timetable.html" title="Dashboard"></iframe>
  </div>

  <script>
    function loadDash(url, key) {
      document.getElementById('appFrame').src = url;
      document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + key).classList.add('active');
    }

    // Restore last active tab from session
    const lastTab = sessionStorage.getItem('meridian-dash-tab');
    if (lastTab === 'pomodoro') loadDash('pomodoro.html', 'pomodoro');

    // Save tab on switch
    document.querySelectorAll('.dash-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.id.replace('tab-', '');
        sessionStorage.setItem('meridian-dash-tab', key);
      });
    });
  </script>
</body>
</html>
